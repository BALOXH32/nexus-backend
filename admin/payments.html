<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments — Nexus Admin</title>
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="toast-container"></div>

<!-- IMAGE PREVIEW MODAL -->
<div class="modal-overlay" id="imgPreviewOverlay" onclick="closeModal('imgPreviewOverlay')">
  <div style="max-width:600px;width:100%;padding:1rem;">
    <img id="imgPreviewEl" src="" alt="Payment Screenshot" style="width:100%;border-radius:16px;border:1px solid rgba(255,255,255,0.12);">
    <div style="text-align:center;margin-top:1rem;">
      <button class="btn ghost" onclick="closeModal('imgPreviewOverlay')">Close</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="Untitled_design_3_.png" alt="Nexus">
    <span>Nexus Admin</span>
  </div>
  <div class="header-right">
    <div class="header-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search payments…" id="paymentsSearch">
    </div>
    <div class="admin-avatar">AD</div>
  </div>
  <div class="menu-toggle"><span></span><span></span><span></span></div>
</header>

<div class="sidebar-overlay"></div>

<div class="admin-container">
  <aside class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="payments.html" class="active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Payments
    </a>
    <a href="students.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Students
    </a>
    <a href="courses.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Courses
    </a>
    <div class="sidebar-section">Quick Links</div>
    <a href="https://wa.me/923442411264" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      WhatsApp Support
    </a>
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        View Website
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Payment Requests</h1>
        <p>Review and approve student payment submissions</p>
      </div>
      <div class="page-header-right">
        <div class="table-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search by name or course…" id="paymentsSearch">
        </div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-block-header">
        <h2>💳 Payments</h2>
        <div class="tabs">
          <button class="tab-btn active payment-tab" data-filter="pending">⏳ Pending</button>
          <button class="tab-btn payment-tab" data-filter="approved">✅ Approved</button>
          <button class="tab-btn payment-tab" data-filter="rejected">❌ Rejected</button>
          <button class="tab-btn payment-tab" data-filter="all">All</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Email</th>
              <th>Course</th>
              <th>Method</th>
              <th>Amount</th>
              <th>Screenshot</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="paymentsTable"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="admin.js"></script>
<script>
  const psInput = document.getElementById('paymentsSearch');
  psInput?.addEventListener('input', () => {
    const q = psInput.value.toLowerCase();
    const filtered = (window._allPayments || []).filter(p =>
      (p.name||'').toLowerCase().includes(q) ||
      (p.email||'').toLowerCase().includes(q) ||
      (p.course||'').toLowerCase().includes(q)
    );
    renderPaymentsTable(filtered);
  });
</script>
</body>
</html>
