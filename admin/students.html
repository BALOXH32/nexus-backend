<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students — Nexus Admin</title>
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="toast-container"></div>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="Untitled_design_3_.png" alt="Nexus">
    <span>Nexus Admin</span>
  </div>
  <div class="header-right">
    <div class="admin-avatar">AD</div>
  </div>
  <div class="menu-toggle"><span></span><span></span><span></span></div>
</header>

<div class="sidebar-overlay"></div>

<div class="admin-container">
  <aside class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="payments.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Payments
    </a>
    <a href="students.html" class="active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Students
    </a>
    <a href="courses.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Courses
    </a>
    <div class="sidebar-section">Quick Links</div>
    <a href="https://wa.me/923442411264" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      WhatsApp Support
    </a>
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        View Website
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Students</h1>
        <p>All enrolled students across all courses</p>
      </div>
      <div class="page-header-right">
        <div class="table-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search by name, email or course…" id="studentsSearch">
        </div>
        <button class="btn ghost sm" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
    </div>

    <div class="section-block">
      <div class="section-block-header">
        <h2>🎓 Enrolled Students</h2>
        <span id="studentCountLabel" style="color:var(--muted);font-size:.82rem;"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Email</th>
              <th>Course</th>
              <th>Phone</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="studentsTable"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="admin.js"></script>
<script>
  // Update count label after render
  const origRender = renderStudentsTable;
  window.renderStudentsTable = function(students) {
    origRender(students);
    const el = document.getElementById('studentCountLabel');
    if (el) el.textContent = `${students.length} student${students.length !== 1 ? 's' : ''}`;
  };

  function exportCSV() {
    const rows = window._allStudents || [];
    if (!rows.length) { toast('No students to export', 'info'); return; }
    const headers = ['Name','Email','Course','Phone'];
    const csv = [headers.join(','), ...rows.map(s => [s.name,s.email,s.course,s.phone].map(v => `"${v||''}"`).join(','))].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'nexus-students-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    toast('CSV exported ✅', 'success');
  }
</script>
</body>
</html>
