<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses — Nexus Admin</title>
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="toast-container"></div>

<!-- ADD/EDIT COURSE MODAL -->
<div class="modal-overlay" id="courseModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('courseModal')">✕</button>
    <h2 id="courseModalTitle">Add New Course</h2>
    <input type="hidden" id="courseId">
    <div class="form-row">
      <div class="form-group">
        <label>Course Name *</label>
        <input type="text" id="courseName" placeholder="e.g. Digital Marketing">
      </div>
      <div class="form-group">
        <label>Price (PKR) *</label>
        <input type="number" id="coursePrice" placeholder="999">
      </div>
    </div>
    <div class="form-group">
      <label>Duration</label>
      <input type="text" id="courseDuration" placeholder="e.g. 3 Months Program">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="courseDesc" placeholder="Brief course description…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn ghost" onclick="closeModal('courseModal')">Cancel</button>
      <button class="btn secondary" onclick="saveCourse()">💾 Save Course</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="Untitled_design_3_.png" alt="Nexus">
    <span>Nexus Admin</span>
  </div>
  <div class="header-right">
    <div class="admin-avatar">AD</div>
  </div>
  <div class="menu-toggle"><span></span><span></span><span></span></div>
</header>

<div class="sidebar-overlay"></div>

<div class="admin-container">
  <aside class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="payments.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Payments
    </a>
    <a href="students.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Students
    </a>
    <a href="courses.html" class="active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Courses
    </a>
    <div class="sidebar-section">Quick Links</div>
    <a href="https://wa.me/923442411264" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      WhatsApp Support
    </a>
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        View Website
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Courses</h1>
        <p>Manage your academy's course catalogue</p>
      </div>
      <div class="page-header-right">
        <button class="btn" onclick="openAddCourse()">+ Add Course</button>
      </div>
    </div>

    <div class="section-block">
      <div class="section-block-header">
        <h2>📚 Course Catalogue</h2>
        <div class="table-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search courses…" id="coursesSearch">
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Course</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="coursesTable"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
